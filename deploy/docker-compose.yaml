# RAGKB 本地依赖编排
# 用法：docker compose -f deploy/docker-compose.yaml up -d
# 包含：MySQL / Redis / Elasticsearch / Qdrant / MinIO / Kafka / Tika
name: ragkb

services:
  mysql:
    image: mysql:8.0
    container_name: ragkb-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: ragkb
    ports:
      - "3306:3306"
    volumes:
      - ragkb-mysql-data:/var/lib/mysql
    networks:
      - ragkb-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ragkb-redis
    ports:
      - "6379:6379"
    volumes:
      - ragkb-redis-data:/data
    networks:
      - ragkb-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    build:
      context: ..
      dockerfile: deploy/elasticsearch/Dockerfile
    image: ragkb-elasticsearch:8.13.4-ik
    container_name: ragkb-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ragkb-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - ragkb-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: ragkb-qdrant
    ports:
      - "6333:6333" # HTTP / dashboard
      - "6334:6334" # gRPC，Go client 使用这个端口
    volumes:
      - ragkb-qdrant-data:/qdrant/storage
    networks:
      - ragkb-network

  minio:
    image: minio/minio:latest
    container_name: ragkb-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - ragkb-minio-data:/data
    networks:
      - ragkb-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: ragkb-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - ragkb-kafka-data:/tmp/kraft-combined-logs
    networks:
      - ragkb-network

  tika:
    image: apache/tika:latest-full
    container_name: ragkb-tika
    ports:
      - "9998:9998"
    networks:
      - ragkb-network

volumes:
  ragkb-mysql-data:
  ragkb-redis-data:
  ragkb-elasticsearch-data:
  ragkb-qdrant-data:
  ragkb-minio-data:
  ragkb-kafka-data:

networks:
  ragkb-network:
    name: ragkb-network
